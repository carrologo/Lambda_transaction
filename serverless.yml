service: transaction-service-api
frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  environment:
    SUPABASE_URL: ${env:SUPABASE_URL}
    SUPABASE_KEY: ${env:SUPABASE_KEY}

plugins:
  - serverless-offline

functions:
  lambdaTransaction:
    name: lambdaTransaction-${opt:stage, 'dev'}
    handler: src/infrastructure/lambdas/handler.createTransactionHandler
    events:
      - http:
          path: /transactions
          method: post
          cors: true